<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background linear gradient to represent the bright blue sky and lush green trees -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" /> <!-- Sky Blue -->
      <stop offset="45%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#22c55e;stop-opacity:1" /> <!-- Tree green -->
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" /> <!-- Deep Forest Green -->
    </linearGradient>
    <linearGradient id="manGlasses" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#facc15;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="womanGlasses" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background container styled as a rounded rect matching the logo layout -->
  <rect width="100%" height="100%" rx="128" fill="url(#skyGrad)" />
  
  <!-- Add beautiful decorative tree leaf shapes in background -->
  <path d="M 40,160 Q 80,100 120,160 Q 160,110 200,160" fill="#14532d" opacity="0.35" />
  <path d="M 320,150 Q 360,95 400,155 Q 440,105 480,150" fill="#14532d" opacity="0.35" />
  <circle cx="100" cy="80" r="45" fill="#166534" opacity="0.25" />
  <circle cx="410" cy="100" r="55" fill="#166534" opacity="0.25" />

  <!-- Male Figure (Left Side, slightly larger/higher shoulder) -->
  <g id="male-couple" transform="translate(15, 20)">
    <!-- Body / Shirt -->
    <path d="M 60,512 C 60,370 120,320 220,320 C 240,360 230,420 220,512 Z" fill="#ffffff" />
    <!-- Collar details -->
    <path d="M 160,320 L 175,370 L 190,320 Z" fill="#cbd5e1" />
    <path d="M 140,320 L 160,355" stroke="#000000" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    
    <!-- Neck -->
    <path d="M 141,270 L 141,330 L 199,330 L 199,270 Z" fill="#fed7aa" />
    <path d="M 141,310 C 141,330 199,330 199,310" fill="#fdba74" opacity="0.5" />

    <!-- Face / Head shape -->
    <path d="M 120,200 C 120,285 220,285 220,200" fill="#fed7aa" />
    
    <!-- Sunglasses (Modern green-blue reflective shades as in photo) -->
    <path d="M 116,192 Q 170,212 224,192 C 218,222 122,222 116,192 Z" fill="url(#manGlasses)" />
    <!-- Bridge and rims of glasses -->
    <path d="M 167,194 Q 170,202 173,194" stroke="#1e293b" stroke-width="4" stroke-linecap="round" />
    <path d="M 116,192 Q 170,212 224,192" stroke="#0f172a" stroke-width="2" fill="none" />

    <!-- Cap (White Cap as worn by man in photo) -->
    <path d="M 114,180 C 114,100 226,100 226,180 Z" fill="#ffffff" />
    <!-- Swoosh logo on cap -->
    <path d="M 155,135 Q 175,123 190,127 Q 170,139 150,147" fill="#1e293b" />
    <!-- Visor brim -->
    <path d="M 98,176 Q 162,185 226,185 Q 235,170 226,165 L 102,165 Z" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5" />
  </g>

  <!-- Female Figure (Right Side, slightly lower, overlapping shoulders) -->
  <g id="female-couple" transform="translate(-10, 30)">
    <!-- Body / Shirt -->
    <path d="M 230,512 C 240,380 340,330 440,330 C 440,410 420,440 440,512 Z" fill="#ffffff" />
    <!-- Collar/shirt V-neck detail -->
    <path d="M 310,330 L 325,375 L 340,330 Z" fill="#1e293b" />
    <rect x="362" y="380" width="30" height="8" rx="2" fill="#1e293b" opacity="0.3" transform="rotate(-10, 362, 380)" />

    <!-- Neck -->
    <path d="M 295,280 L 295,340 L 355,340 L 355,280 Z" fill="#ffedd5" />
    <path d="M 295,320 C 295,340 355,340 355,320" fill="#fed7aa" opacity="0.5" />

    <!-- Face / Head shape -->
    <path d="M 275,210 C 275,295 375,295 375,210" fill="#ffedd5" />
    
    <!-- Sunglasses (sports sunglasses with purple-blue reflective lenses as in photo) -->
    <path d="M 271,202 Q 325,220 379,202 C 373,232 277,232 271,202 Z" fill="url(#womanGlasses)" />
    <!-- Glasses details -->
    <path d="M 322,204 Q 325,212 328,204" stroke="#1e293b" stroke-width="4" stroke-linecap="round" />
    <path d="M 271,202 Q 325,220 379,202" stroke="#0f172a" stroke-width="2" fill="none" />

    <!-- Visor Cap (White Visor as worn by woman) -->
    <path d="M 276,200 Q 325,210 374,195 Q 365,170 345,175 L 282,185 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <path d="M 276,199 Q 325,209 374,194" stroke="#e2e8f0" stroke-width="3" />
    <!-- Upper cap mesh dome -->
    <path d="M 295,180 C 295,142 355,142 355,180 Z" fill="#ffffff" />
    <!-- "pino" logo text representation on visor -->
    <text x="310" y="161" font-family="'Outfit', sans-serif" font-weight="900" font-size="12" fill="#1e293b" letter-spacing="1">pino</text>
  </g>
</svg>
