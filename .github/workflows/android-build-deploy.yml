name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Auto-Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create/update Releases and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Workspace Diagnostics (Check if files are committed)
        run: |
          echo "=== Current Working Directory ==="
          pwd
          echo "=== File List ==="
          ls -la
          echo "=== Gradle Wrapper Check ==="
          if [ -f gradlew ]; then
            echo "gradlew exists"
          else
            echo "gradlew is MISSING in repository! Let's build it on the fly if needed."
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Restore Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Successfully restored debug.keystore from debug.keystore.base64"
          else
            echo "debug.keystore.base64 not found, checking fallback"
          fi

      - name: Clean and Regenerate Gradle Wrapper JAR
        run: |
          echo "=== Removing pre-existing or potentially corrupt gradle-wrapper.jar ==="
          rm -f gradle/wrapper/gradle-wrapper.jar
          
          echo "=== Attempting to generate wrapper using local system gradle ==="
          if command -v gradle >/dev/null 2>&1; then
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin || true
          fi
          
          # Check if the jar was successfully created and of valid integrity
          if [ -f gradle/wrapper/gradle-wrapper.jar ] && [ -s gradle/wrapper/gradle-wrapper.jar ] && unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "✅ Successfully generated and verified gradle-wrapper.jar using system gradle!"
          else
            echo "⚠️ System gradle generation failed or produced a corrupt jar. Trying direct safe GitHub download..."
            mkdir -p gradle/wrapper
            rm -f gradle/wrapper/gradle-wrapper.jar
            
            # Direct link to official gradle-wrapper.jar wrapper bin from official GitHub repository
            curl -sSLo gradle/wrapper/gradle-wrapper.jar "https://github.com/gradle/gradle/raw/v8.10.2/gradle/wrapper/gradle-wrapper.jar" || \
            curl -sSLo gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.jar" || true
          fi
          
          # Final validation and fallback
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ ! -s gradle/wrapper/gradle-wrapper.jar ] || ! unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "⚠️ Primary downloads failed or were invalid. Trying alternative master source..."
            rm -f gradle/wrapper/gradle-wrapper.jar
            curl -sSLo gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar" || true
          fi
          
          # Ultimate validation
          if [ -f gradle/wrapper/gradle-wrapper.jar ] && [ -s gradle/wrapper/gradle-wrapper.jar ] && unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "✅ Successfully restored and verified gradle-wrapper.jar!"
            ls -la gradle/wrapper/gradle-wrapper.jar
          else
            echo "❌ CRITICAL ERROR: Could NOT restore a valid gradle-wrapper.jar file!"
            exit 1
          fi
          
          echo "=== Granting execution permission to gradlew ==="
          chmod +x gradlew

      - name: Create Mock or Real Env Files for Secrets Plugin
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
            echo "Successfully copied .env.example to .env for build process"
          else
            touch .env
            echo "MAPS_API_KEY=mock-api-key" >> .env
          fi

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --no-configuration-cache --stacktrace

      - name: Locate Generated APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK file found!"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK at: $APK_PATH"

      - name: Get current date & build tag
        id: vars
        run: |
          echo "tag=v1.0-build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "📱 SKKY Golf Auto-Build #${{ github.run_number }}"
          body: |
            ## SKKY Golf 자동 빌드 완료!
            
            인공지능 스튜디오(AI Studio)에서 작업하시고 깃허브에 푸시된 최신 코드가 자동으로 빌드되었습니다. 아래 최신 APK 설치파일을 다운로드 받아주세요.
            
            - **빌드 일시:** `${{ steps.vars.outputs.date }}` (UTC)
            - **커밋 메시지:** `${{ github.event.head_commit.message }}`
            - **브랜치:** `${{ github.ref_name }}`
            
            ### 📥 다운로드 안내
            모바일 브라우저에서 이 릴리즈 페이지에 접속한 후, 아래 **`app-debug.apk`**를 다운로드하여 직접 설치하시면 최신 앱 내용이 즉시 실폰에 반영됩니다.
          draft: false
          prerelease: false
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==== OPTIONAL: FIREBASE APP DISTRIBUTION (COMMENTED FOR EASY ACTIVATION) ====
      # 만약 Firebase App Distribution을 연동하시려면 아래 단계를 주석 해제하고,
      # Firebase Console에서 발급받은 'CREDENTALS'와 'APP_ID'를 GitHub Secrets에 등록하세요.
      #
      # - name: Upload to Firebase App Distribution
      #   if: github.event_name == 'push'
      #   uses: wzieba/Firebase-App-Distribution-Github-Action@v1
      #   with:
      #     appId: ${{ secrets.FIREBASE_APP_ID }}
      #     token: ${{ secrets.FIREBASE_CLI_TOKEN }}
      #     groups: testers
      #     file: ${{ env.APK_PATH }}
